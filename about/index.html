<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About PumaPulse - Beyond Services, We Build Success Stories</title>
  <meta name="description" content="PumaPulse is a team of visionary experts and creators, driving the future of fintech and digital transformation with innovative solutions.">
  <link rel="icon" href="../img/icon.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/theme.css">
  <link rel="stylesheet" href="../css/animations.css">
  <style>
    .about-img-stack{position:relative;height:520px}
    .about-img-main{width:75%;height:420px;object-fit:cover;border-radius:20px;position:absolute;top:0;left:0;box-shadow:0 32px 64px rgba(0,0,0,0.4)}
    .about-img-accent{width:55%;height:260px;object-fit:cover;border-radius:16px;position:absolute;bottom:0;right:0;border:4px solid var(--bg);box-shadow:0 16px 40px rgba(0,0,0,0.4)}
    .about-badge{position:absolute;top:50%;left:60%;transform:translate(-50%,-50%);background:rgba(8,12,24,0.88);backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,0.12);border-radius:16px;padding:18px 22px;text-align:center;z-index:2}
    .about-badge .big{font-size:2rem;font-weight:800;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
    .about-badge p{font-size:0.75rem;color:rgba(240,244,255,0.5);margin:4px 0 0}
    .about-strip{display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:center}
    .services-list{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .service-list-item{display:flex;gap:12px;align-items:flex-start;padding:16px;background:var(--card);border:1px solid var(--border);border-radius:12px;transition:all 0.25s}
    .service-list-item:hover{border-color:var(--border2)}
    .service-list-item .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0;margin-top:6px}
    .service-list-item h5{font-size:0.9rem;margin-bottom:4px}
    .service-list-item p{font-size:0.8rem}
    .timeline{display:flex;flex-direction:column;gap:0;position:relative}
    .timeline::before{content:'';position:absolute;left:20px;top:0;bottom:0;width:2px;background:linear-gradient(to bottom,var(--accent),var(--primary));opacity:0.3}
    .timeline-item{display:flex;gap:24px;padding-bottom:36px;position:relative}
    .timeline-dot{width:40px;height:40px;border-radius:50%;background:var(--ad);border:2px solid var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:0.75rem;font-weight:700;color:var(--accent);z-index:1}
    .timeline-content{padding-top:8px}
    .timeline-content h4{margin-bottom:6px;font-size:1rem}
    .timeline-content p{font-size:0.87rem}
    @media(max-width:1024px){.about-strip{grid-template-columns:1fr;gap:44px}.about-img-stack{height:320px}.services-list{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div id="nav-placeholder"></div>



<!-- CTA -->
<section class="section-sm">
  <div class="container">
    <div class="cta-banner reveal">
      <div class="cta-bg"><img src="https://images.pexels.com/photos/8358136/pexels-photo-8358136.jpeg?auto=compress&cs=tinysrgb&w=1600" alt="CTA"></div>
      <div class="cta-content">
        <h2>Ready to Build Something <span class="grad-text">Remarkable?</span></h2>
        <p>Let's talk about your project. No commitment, just a conversation about what's possible. We'll help you find the right solution for your specific goals and budget.</p>
        <div class="cta-btns">
          <a href="contact/" class="btn btn-accent btn-lg btn-magnetic">Start a Conversation</a>
          <a href="careers/" class="btn btn-white btn-lg">Join Our Team</a>
        </div>
      </div>
    </div>
  </div>
</section>

<div id="footer-placeholder"></div>
<script src="../js/nav.js"></script>
<script src="../js/main.js"></script>
<script src="../js/animations.js"></script>
</body>
</html>
